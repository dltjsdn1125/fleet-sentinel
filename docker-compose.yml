# 로컬 개발용 PostgreSQL (Prisma multi-schema `fleetsentinel` 호환)
# 시작: docker compose up -d
# 중지: docker compose down
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fleetsentinel
      POSTGRES_DB: fleetsentinel
    ports:
      - "5433:5432"
    volumes:
      - fleetsentinel_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fleetsentinel"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  fleetsentinel_pg:
